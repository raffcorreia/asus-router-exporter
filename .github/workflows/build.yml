name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest

      - name: Update image tag in infra repo
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          DEVOPS_INFRA_TOKEN: ${{ secrets.DEVOPS_INFRA_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone https://x-access-token:${DEVOPS_INFRA_TOKEN}@github.com/rafflabs-net/devops-infra.git
          cd devops-infra
          sed -i "s|ghcr.io/${{ github.repository }}:.*|ghcr.io/${{ github.repository }}:${SHA}|g" k8s/monitoring/asus-exporter.yaml
          git add k8s/monitoring/asus-exporter.yaml
          git diff --staged --quiet || git commit -m "chore(asus-exporter): update image to ${SHA}"
          git push
